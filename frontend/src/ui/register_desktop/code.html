        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Navigation Suppression (Transactional Page) -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Abstract Background Decorative Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container rounded-full blur-[120px]"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-container rounded-full blur-[120px]"></div>
</div>
<div class="w-full max-w-[400px] z-10">
<!-- Header Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<div class="w-12 h-12 bg-primary-gradient rounded-xl flex items-center justify-center text-white shadow-xl">
<span class="material-symbols-outlined text-3xl" data-icon="task_alt">task_alt</span>
</div>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Kinetic Archive</h1>
<p class="text-on-surface-variant font-medium tracking-tight">Organize your day with ease</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-sm border border-outline-variant/15 backdrop-blur-xl">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="email">Email address</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface placeholder:text-outline/50" id="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Password Strength Indicator -->
<div class="mt-3 px-1">
<div class="flex justify-between items-center mb-2">
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Strength: Strong</span>
<span class="text-[10px] text-on-surface-variant">8+ characters</span>
</div>
<div class="flex gap-1 h-1">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-surface-container-high rounded-full"></div>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="confirm-password">Confirm Password</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface placeholder:text-outline/50" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
<!-- Submit CTA -->
<button class="w-full bg-primary-gradient py-4 rounded-xl text-white font-bold tracking-tight shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-200" type="submit">
                        Create Account
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/15"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-3 bg-surface-container-lowest text-outline font-medium">Or continue with</span>
</div>
</div>
<!-- Social Proof / Alternative -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-3 px-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-colors duration-200">
<img alt="Google" class="w-4 h-4 mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxMUVGmLTYNV8IWYULXY2GVl6dlF01mF189V9KQhRrinTtluPc1EvLmDtM3zELEuLrVLbf99DHXY67swyv3Fc4djFVIQ5yDGvF5szeSHIEL2ZitQ6-JcL9f9aOti18GTmIxUM-MU7NvP37i1T2HEdVu2UeX_jjgAcISQVxd4UbGmaQB207mqSjmhNFqmARPAMjEpdJA_0UT2THstRkM1dzTGLcmqOVXkg2okd0BZ_XFdoKm_R0KRUmgq2SaR0AOONQrYVRs-L9wLs"/>
<span class="text-xs font-semibold text-on-surface-variant">Google</span>
</button>
<button class="flex items-center justify-center py-3 px-4 bg-surface-container-low hover:bg-surface-container-high rounded-xl transition-colors duration-200">
<span class="material-symbols-outlined text-lg mr-2" data-icon="apple">ios</span>
<span class="text-xs font-semibold text-on-surface-variant">Apple</span>
</button>
</div>
</div>
<!-- Bottom Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Sign in</a>
</p>
</div>
<!-- Footer Policy Links -->
<div class="mt-12 flex justify-center space-x-6">
<a class="text-[11px] text-outline font-medium hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="text-[11px] text-outline font-medium hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</div>
</main>
<!-- Bottom Navigation Suppression (Transactional Page) -->
</body></html>
