<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Archive - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#494b83",
                        "surface-container-high": "#e2e7ff",
                        "on-surface-variant": "#464554",
                        "outline": "#767586",
                        "on-tertiary-fixed": "#301400",
                        "on-secondary-fixed-variant": "#404178",
                        "tertiary": "#904900",
                        "surface-dim": "#d2d9f4",
                        "on-primary-fixed": "#07006c",
                        "surface-container-highest": "#dae2fd",
                        "on-tertiary-container": "#fffbff",
                        "on-background": "#131b2e",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "on-surface": "#131b2e",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#b55d00",
                        "surface-container-low": "#f2f3ff",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-secondary-fixed": "#13144a",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "secondary": "#575992",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#e1e0ff",
                        "secondary-fixed-dim": "#c0c1ff",
                        "inverse-on-surface": "#eef0ff",
                        "inverse-primary": "#c0c1ff",
                        "secondary-fixed": "#e1e0ff",
                        "primary-container": "#6063ee",
                        "surface-tint": "#494bd6",
                        "surface-variant": "#dae2fd",
                        "on-primary": "#ffffff",
                        "surface-container": "#eaedff",
                        "tertiary-fixed-dim": "#ffb783",
                        "surface-bright": "#faf8ff",
                        "outline-variant": "#c7c4d7",
                        "inverse-surface": "#283044",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "primary": "#4648d4",
                        "background": "#faf8ff",
                        "surface": "#faf8ff",
                        "on-error": "#ffffff",
                        "secondary-container": "#bdbefe",
                        "tertiary-fixed": "#ffdcc5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf8ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface text-on-background antialiased flex items-center justify-center min-h-screen p-6">
<!-- Login Container -->
<main class="w-full max-w-[400px] flex flex-col gap-8">
<!-- Brand Identity Section -->
<header class="flex flex-col items-center text-center space-y-2">
<div class="flex items-center gap-2 mb-2">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">archive</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tighter text-on-surface">Kinetic Archive</h1>
</div>
<p class="text-on-surface-variant font-medium tracking-tight">Organize your day with ease</p>
</header>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_24px_48px_-12px_rgba(19,27,46,0.04)] border border-outline-variant/15">
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant px-1" for="email">Email</label>
<div class="relative group">
<input class="w-full px-4 py-3 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface" id="email" name="email" placeholder="name@company.com" type="email" value="alex.jordan@example.com"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<button class="text-xs font-bold text-primary hover:text-primary-container transition-colors" type="button">Forgot?</button>
</div>
<div class="relative group">
<input class="w-full px-4 py-3 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface" id="password" name="password" placeholder="••••••••" type="password" value="password123"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Inline Validation Error -->
<div class="flex items-center gap-2 bg-error-container/40 p-3 rounded-lg border border-error/10">
<span class="material-symbols-outlined text-error text-[18px]">error</span>
<p class="text-sm font-medium text-on-error-container">Invalid credentials</p>
</div>
<!-- CTA Button -->
<button class="w-full py-3.5 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-xl shadow-md shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all duration-150" type="submit">
                    Sign In
                </button>
</form>
<!-- Secondary Actions -->
<div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-sm">
                    Don't have an account? 
                    <a class="font-bold text-primary hover:text-primary-container transition-colors ml-1" href="#">Register</a>
</p>
</div>
</div>
<!-- Decorative Subtle Element -->
<footer class="text-center">
<div class="flex justify-center gap-4">
<div class="h-1 w-1 rounded-full bg-outline-variant"></div>
<div class="h-1 w-1 rounded-full bg-outline-variant"></div>
<div class="h-1 w-1 rounded-full bg-outline-variant"></div>
</div>
</footer>
</main>
<!-- Background Decoration (Asymmetric Layering) -->
<div class="fixed top-0 right-0 -z-10 w-[40vw] h-[40vw] bg-primary-fixed/30 rounded-full blur-[120px] translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[30vw] h-[30vw] bg-surface-container-high/50 rounded-full blur-[100px] -translate-x-1/2 translate-y-1/2"></div>
</body></html>
