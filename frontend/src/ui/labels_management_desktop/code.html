</button>

<button class="w-full flex items-center gap-3 px-3 py-2 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-all">

</div>
</div>

<span class="font-semibold">Create New Label</span>
</button>

<div class="flex items-center gap-6">

<button class="p-2 hover:bg-white rounded-lg text-error"><span class="material-symbols-outlined text-[20px]">delete</span></button>

</div>

<button class="p-2 hover:bg-white rounded-lg text-error"><span class="material-symbols-outlined text-[20px]">delete</span></button>
